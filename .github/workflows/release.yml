name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APKs (per-arch)
        run: ./gradlew assembleDebug

      - name: Build release APKs (per-arch)
        run: ./gradlew assembleRelease
        continue-on-error: true

      - name: Rename APKs
        run: |
          TAG="${GITHUB_REF_NAME}"
          cd app/build/outputs/apk/debug
          for f in *.apk; do
            arch=$(echo "$f" | sed 's/app-//;s/-debug.apk//')
            mv "$f" "voyager-${TAG}-${arch}-debug.apk" 2>/dev/null || true
          done
          if [ -d "../release" ]; then
            cd ../release
            for f in *.apk; do
              arch=$(echo "$f" | sed 's/app-//;s/-release-unsigned.apk//;s/-release.apk//')
              mv "$f" "voyager-${TAG}-${arch}-release.apk" 2>/dev/null || true
            done
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            app/build/outputs/apk/debug/voyager-*.apk
            app/build/outputs/apk/release/voyager-*.apk
