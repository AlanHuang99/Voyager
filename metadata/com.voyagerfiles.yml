AutoName: Voyager

Summary: Material Design 3 file browser with SFTP, FTP, SMB, and WebDAV support

Description: |
  Voyager is a file manager built with Material Design 3 and Jetpack Compose.

  Features:
  * Local file browsing with list and grid views
  * SFTP/SSH remote file access
  * FTP remote file access
  * SMB/CIFS network share browsing
  * WebDAV remote file access
  * 12 built-in themes including Catppuccin (Mocha, Macchiato, Frappé, Latte)
  * Custom theme support
  * AMOLED black theme
  * Material You dynamic color support (Android 12+)
  * Bookmarks and quick access
  * Multi-select with copy/cut/paste
  * No analytics or tracking

